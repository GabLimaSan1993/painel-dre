<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DRE Shopee — Emballerge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap');
:root{--bg:#1d272e;--surface:#26323b;--gold:#e2a526;--gold-soft:#f0c469;--text:#f3f1ea;--muted:#8c9aa3;--line:#36454f;--pos:#3fb47e;--neg:#d98a5b;--fdisplay:'Sora',sans-serif;--fbody:'Manrope',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fbody)}
.wrap{max-width:1180px;margin:0 auto;padding:28px 20px}
#login{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}
.loginbox{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:40px;width:100%;max-width:380px}
.loginbox .eyebrow{color:var(--gold);font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase}
.loginbox h2{font-family:var(--fdisplay);font-size:24px;font-weight:700;margin:6px 0 24px}
.loginbox label{display:block;color:var(--muted);font-size:12px;font-weight:600;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.08em}
.loginbox input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:10px;font-family:var(--fbody);font-size:15px}
.loginbox input:focus{outline:none;border-color:var(--gold)}
.loginbox button{width:100%;margin-top:22px;background:var(--gold);color:#1d272e;border:none;padding:13px;border-radius:10px;font-family:var(--fbody);font-weight:700;font-size:15px;cursor:pointer}
.loginbox .err{color:var(--neg);font-size:13px;margin-top:14px;min-height:18px;text-align:center}
#app{display:none}
.top{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:16px}
.eyebrow{color:var(--gold);font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase}
h1{font-family:var(--fdisplay);font-size:32px;font-weight:700;margin-top:4px}
.sub{color:var(--muted);font-size:14px;margin-top:6px}
.controls{display:flex;align-items:flex-end;gap:12px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld span{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
select{appearance:none;background:var(--surface);color:var(--text);border:1px solid var(--line);padding:10px 16px;border-radius:12px;font-family:var(--fbody);font-weight:500;font-size:14px;min-width:240px;cursor:pointer}
.logout{background:transparent;color:var(--muted);border:1px solid var(--line);padding:10px 14px;border-radius:12px;font-family:var(--fbody);font-size:13px;cursor:pointer}
.tablewrap{margin-top:26px;overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:8px}
table.dre{width:100%;border-collapse:collapse;font-size:14px;min-width:620px}
table.dre th,table.dre td{padding:13px 16px;text-align:right;font-variant-numeric:tabular-nums}
table.dre th.acc,table.dre td.acc{text-align:left;white-space:nowrap}
table.dre thead th{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--line)}
table.dre thead th.acc{font-family:var(--fdisplay)}
table.dre tbody td{border-bottom:1px solid rgba(54,69,79,.4)}
.r-base td,.r-neg td,.r-pos td{color:var(--text)}
.r-pos td.num{color:var(--gold-soft)}
.r-sub td{border-top:1px solid var(--line);font-weight:600}
.r-total td{border-top:2px solid var(--gold);font-weight:700;font-family:var(--fdisplay);font-size:15px}
.r-total td.num{color:var(--gold-soft)}
.r-memo td{color:var(--muted);font-size:12.5px;border-bottom:none}
.r-memo:first-of-type td{padding-top:16px}
td.click{cursor:pointer;border-radius:6px}
td.click:hover{background:rgba(226,165,38,.12);color:var(--gold-soft)}
.hint{color:var(--gold);font-size:10px;opacity:.7;margin-left:4px}
.cap{color:var(--muted);font-size:11px;margin:10px 4px 0;text-transform:uppercase;letter-spacing:.08em}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;margin-top:18px}
.panel h3{font-family:var(--fdisplay);font-size:18px;margin-bottom:4px}
.panel .ph{color:var(--muted);font-size:12px;margin-bottom:14px}
.dtl{width:100%;border-collapse:collapse;font-size:13px}
.dtl th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--line)}
.dtl td{padding:8px 10px;border-bottom:1px solid rgba(54,69,79,.5)}
.dtl td.num,.dtl th.num{text-align:right;font-variant-numeric:tabular-nums}
.dtl tr.subtot td{font-weight:700;color:var(--gold-soft);border-top:1px solid var(--gold)}
.r-grouphdr td{border-top:1px solid var(--line);font-weight:600}
.r-subitem td{font-size:13px;color:var(--muted)}
.r-subitem td.acc{padding-left:34px}
.scroll{max-height:380px;overflow:auto}
.loading{color:var(--muted);padding:20px;text-align:center}
.sec-title{color:var(--gold);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px}
</style></head>
<body>
<div id="login"><div class="loginbox">
  <div class="eyebrow">Emballerge · DRE Gerencial</div><h2>Acesso ao painel</h2>
  <label>Email</label><input id="email" type="email" autocomplete="username" placeholder="seu@email.com">
  <label>Senha</label><input id="senha" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Entrar</button><div class="err" id="loginErr"></div>
</div></div>
<div id="app"><div class="wrap">
<div class="top">
  <div><div class="eyebrow">Emballerge · DRE Gerencial</div>
  <h1>DRE por Operação — Shopee</h1>
  <div class="sub" id="escopo">Todas as unidades · clique num valor para detalhar o mês</div></div>
  <div class="controls">
    <label class="fld"><span>Unidade / CNPJ</span><select id="cnpjSel" onchange="setCnpj(this.value)"></select></label>
    <button class="logout" onclick="logout()">Sair</button>
  </div>
</div>
<div id="dre"></div>
<div class="cap">Valores em R$ · 2026</div>
<div id="detalhe"></div>
</div></div>
<script>
const URL="https://ksmtbrgnchlvzabaspev.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzbXRicmduY2hsdnphYmFzcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzYxNzMsImV4cCI6MjA5NjM1MjE3M30.8mKuwcxBJH2F4FbFn_dHfC-Ll9wXNgtJUUSOuljYNIQ";
const MESES=[["Jan",1],["Fev",2],["Mar",3],["Abr",4],["Mai",5]];
let cnpjSel="TODOS", abertoSel=null;
let TOKEN=localStorage.getItem("sb_token")||null;
const ent=v=>(Math.round(Number(v)||0)).toLocaleString("pt-BR");
const fmt=v=>"R$ "+(Number(v)||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const n2=v=>(Number(v)||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const enc=encodeURIComponent;
const ded=d=>(d.icms||0)+(d.pis||0)+(d.cofins||0);
async function api(path){
  const r=await fetch(URL+"/rest/v1/"+path,{headers:{apikey:KEY,Authorization:"Bearer "+(TOKEN||KEY)}});
  if(r.status===401){logout();throw new Error("Sessão expirada — faça login de novo.");}
  return r.json();
}
const fcnpj=()=>cnpjSel==="TODOS"?"":`&cnpj=eq.${enc(cnpjSel)}`;
function showLogin(){document.getElementById("login").style.display="flex";document.getElementById("app").style.display="none";}
function showApp(){document.getElementById("login").style.display="none";document.getElementById("app").style.display="block";}
async function login(){
  const email=document.getElementById("email").value.trim(),senha=document.getElementById("senha").value;
  const err=document.getElementById("loginErr");err.textContent="Entrando…";
  try{
    const r=await fetch(URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password:senha})});
    const d=await r.json();
    if(d.access_token){TOKEN=d.access_token;localStorage.setItem("sb_token",TOKEN);err.textContent="";showApp();init();}
    else{err.textContent=d.error_description||d.msg||"Email ou senha inválidos.";}
  }catch(e){err.textContent="Erro de conexão: "+e.message;}
}
function logout(){TOKEN=null;localStorage.removeItem("sb_token");document.getElementById("detalhe").innerHTML="";showLogin();}
async function carregarUnidades(){
  const u=await api("v_unidades?select=cnpj,cidade,estado&order=cidade");
  document.getElementById("cnpjSel").innerHTML='<option value="TODOS">Todas as unidades</option>'+
    u.map(x=>`<option value="${x.cnpj}">${x.cidade} (${x.estado}) — ${x.cnpj}</option>`).join("");
}
const LINHAS=[
 {lbl:"Receita Bruta",tipo:"receita",calc:d=>d.receita_bruta,cls:"r-base"},
 {lbl:"(−) Dedução de Impostos",tipo:"impostos",calc:d=>-ded(d),cls:"r-neg"},
 {lbl:"(+) Crédito de Impostos",tipo:"credito",calc:d=>d.credito_impostos,cls:"r-pos"},
 {lbl:"(=) Receita Líquida",calc:d=>d.receita_bruta-ded(d)+(d.credito_impostos||0),cls:"r-sub"},
 {lbl:"(−) CMV",tipo:"cmv",calc:d=>-d.cmv,cls:"r-neg"},
 {lbl:"(=) Lucro Bruto",calc:d=>d.lucro_bruto_ajustado,cls:"r-sub"},
 {lbl:"(−) Custos Operacionais",calc:d=>-(d.frete||0),cls:"r-grouphdr"},
 {lbl:"Frete",tipo:"frete",calc:d=>-(d.frete||0),cls:"r-subitem"},
 {lbl:"(=) Lucro Operacional",calc:d=>d.lucro_operacional,cls:"r-total"},
 {lbl:"Margem Operacional %",calc:d=>d.receita_bruta?d.lucro_operacional/d.receita_bruta*100:0,cls:"r-memo",pct:1},
 {lbl:"ICMS a Recuperar (fora do resultado)",calc:d=>d.icms_a_recuperar,cls:"r-memo"},
];
async function loadDRE(){
  document.getElementById("dre").innerHTML='<div class="loading">Carregando…</div>';
  const view=cnpjSel==="TODOS"?"v_dre_operacao":"v_dre_cnpj";
  const rows=await api(`${view}?ano=eq.2026${fcnpj()}&order=mes`);
  const mapa={}; rows.forEach(r=>mapa[r.mes]=r);
  let h='<div class="tablewrap"><table class="dre"><thead><tr><th class="acc">Conta</th>'+
    MESES.map(([n])=>`<th class="num">${n}/26</th>`).join("")+'</tr></thead><tbody>';
  LINHAS.forEach(L=>{
    h+=`<tr class="${L.cls}"><td class="acc">${L.lbl}${L.tipo?'<span class="hint">▾</span>':''}</td>`;
    MESES.forEach(([n,num])=>{
      const d=mapa[num];
      if(!d){h+='<td class="num">—</td>';return;}
      const v=L.calc(d), txt=L.pct?(v||0).toFixed(1)+"%":ent(v);
      if(L.tipo){h+=`<td class="num click" onclick="abrir('${L.tipo}',${num})">${txt}</td>`;}
      else{h+=`<td class="num">${txt}</td>`;}
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById("dre").innerHTML=h;
}
function setCnpj(v){cnpjSel=v;abertoSel=null;document.getElementById("detalhe").innerHTML="";
  document.getElementById("escopo").textContent=(v==="TODOS"?"Todas as unidades":document.querySelector("#cnpjSel option:checked").textContent)+" · clique num valor para detalhar o mês";
  loadDRE();}
async function abrir(tipo,mes){
  const key=tipo+"-"+mes;
  if(abertoSel===key){abertoSel=null;document.getElementById("detalhe").innerHTML="";return;}
  abertoSel=key;
  const det=document.getElementById("detalhe");det.innerHTML='<div class="panel"><div class="loading">Buscando no banco…</div></div>';
  const F=fcnpj(), mnome=MESES.find(m=>m[1]===mes)[0]+"/2026";
  try{
    if(tipo==="receita"){
      const r=await api(`v_venda_detalhe?ano=eq.2026&mes=eq.${mes}${F}&select=numero_nf,produto,cidade,quantidade,valor_unit,custo_unit,valor_total&order=valor_total.desc`);
      det.innerHTML=panel("Receita — NFs de saída · "+mnome,`${r.length} notas`,
        tabela(["NF","Produto","Cidade","Qtd","Vlr Unit","Custo Unit","Margem","Total"],
          r.map(x=>{const mg=x.valor_unit?((x.valor_unit-x.custo_unit)/x.valor_unit*100):0;
            return [x.numero_nf,x.produto,x.cidade,n2(x.quantidade),fmt(x.valor_unit),fmt(x.custo_unit),mg.toFixed(1)+"%",fmt(x.valor_total)];}),
          [3,4,5,6,7]));
    } else if(tipo==="impostos"){
      const r=await api(`v_venda_detalhe?ano=eq.2026&mes=eq.${mes}${F}&select=numero_nf,produto,vlr_icms,vlr_pis,vlr_cofins&order=numero_nf`);
      det.innerHTML=panel("Impostos deduzidos por nota · "+mnome,"ICMS + PIS + COFINS",
        tabela(["NF","Produto","ICMS","PIS","COFINS"],r.map(x=>[x.numero_nf,x.produto,fmt(x.vlr_icms),fmt(x.vlr_pis),fmt(x.vlr_cofins)]),[2,3,4]));
    } else if(tipo==="credito"){
      const view=cnpjSel==="TODOS"?"v_credito_detalhe":"v_credito_cnpj";
      const r=await api(`${view}?ano=eq.2026&mes=eq.${mes}${F}&select=insumo,credito_alocado&order=credito_alocado.desc`);
      det.innerHTML=panel("Crédito de impostos por insumo · "+mnome,"PIS + COFINS · proporcional ao consumo",
        tabela(["Insumo","Crédito alocado"],r.map(x=>[x.insumo,fmt(x.credito_alocado)]),[1]));
    } else if(tipo==="cmv"){
      const cview=cnpjSel==="TODOS"?"v_consumo_prd":"v_consumo_cnpj";
      const c=await api(`${cview}?ano=eq.2026&mes=eq.${mes}${F}&select=prd,produto,insumo,qtd_consumida,custo_total&order=produto`);
      const cmuRows=await api(`v_cmu_prd?ano=eq.2026&mes=eq.${mes}&select=prd,cmu`);
      const e=await api(`v_entrada_detalhe?ano=eq.2026&mes=eq.${mes}&select=numero_nf,fornecedor,insumo,quantidade,valor_total,custo_unit&order=valor_total.desc`);
      const cmuMap={}; cmuRows.forEach(x=>cmuMap[x.prd]=x.cmu);
      const byIns={};
      c.forEach(x=>{const k=x.insumo;if(!byIns[k])byIns[k]={insumo:k,qtd:0,custo:0};byIns[k].qtd+=Number(x.qtd_consumida)||0;byIns[k].custo+=Number(x.custo_total)||0;});
      const cons=Object.values(byIns).sort((a,b)=>b.custo-a.custo);
      const byPrd={};
      c.forEach(x=>{const k=x.produto;if(!byPrd[k])byPrd[k]={produto:k,prd:x.prd,rows:[],total:0};byPrd[k].rows.push(x);byPrd[k].total+=Number(x.custo_total)||0;});
      let s2='<div class="scroll"><table class="dtl"><thead><tr><th>Produto</th><th>Insumo</th><th class="num">Qtd consumida</th><th class="num">Custo</th></tr></thead><tbody>';
      Object.values(byPrd).forEach(g=>{
        g.rows.forEach(x=>{s2+=`<tr><td>${g.produto}</td><td>${x.insumo}</td><td class="num">${n2(x.qtd_consumida)}</td><td class="num">${fmt(x.custo_total)}</td></tr>`;});
        const cmu=cmuMap[g.prd];
        s2+=`<tr class="subtot"><td colspan="2">Total ${g.produto} · CMU ${cmu!=null?fmt(cmu):"—"}</td><td class="num">—</td><td class="num">${fmt(g.total)}</td></tr>`;
      });
      s2+='</tbody></table></div>';
      det.innerHTML='<div class="panel"><h3>CMV — custo do que foi vendido · '+mnome+'</h3><div class="ph">Consumo da unidade · NFs de entrada são da fábrica (formam o custo médio)</div>'
        +'<div class="sec-title">1 · Consolidado por insumo (PN)</div>'
        +tabela(["Insumo","Qtd consumida","Custo unit (período)","Custo total"],cons.map(x=>[x.insumo,n2(x.qtd),x.qtd?fmt(x.custo/x.qtd):"—",fmt(x.custo)]),[1,2,3])
        +'<div class="sec-title">2 · Consumo por produto</div>'+s2
        +`<div class="sec-title">3 · NFs de entrada que formaram o custo (${e.length} notas)</div>`
        +tabela(["NF","Fornecedor","Insumo","Qtd","Valor","Custo/un"],e.map(x=>[x.numero_nf,x.fornecedor,x.insumo,n2(x.quantidade),fmt(x.valor_total),fmt(x.custo_unit)]),[3,4,5])+'</div>';
    } else if(tipo==="frete"){
      const r=await api(`v_frete_detalhe?ano=eq.2026&mes=eq.${mes}&select=estado,produto,valor_frete&order=valor_frete.desc`);
      const sub=cnpjSel==="TODOS"?`${r.length} trechos (por estado/produto)`:"Frete total da operação por estado/produto · o cartão mostra a parte rateada desta unidade";
      det.innerHTML=panel("Frete · "+mnome,sub,
        tabela(["Estado","Produto","Frete"],r.map(x=>[x.estado,x.produto,fmt(x.valor_frete)]),[2]));
    }
    document.getElementById("detalhe").scrollIntoView({behavior:"smooth",block:"nearest"});
  }catch(err){det.innerHTML='<div class="panel"><div class="loading">Erro ao buscar: '+err.message+'</div></div>';}
}
function panel(t,sub,inner){return `<div class="panel"><h3>${t}</h3><div class="ph">${sub}</div>${inner}</div>`;}
function tabela(cols,rows,numCols){numCols=numCols||[];
  return `<div class="scroll"><table class="dtl"><thead><tr>${cols.map((c,i)=>`<th class="${numCols.includes(i)?'num':''}">${c}</th>`).join("")}</tr></thead>
  <tbody>${rows.map(r=>`<tr>${r.map((v,i)=>`<td class="${numCols.includes(i)?'num':''}">${v}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;}
function init(){carregarUnidades();loadDRE();}
if(TOKEN){showApp();init();}else{showLogin();}
</script></body></html>
